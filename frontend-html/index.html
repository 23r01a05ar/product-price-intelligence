<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Product Price Intelligence</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.upload-box{
width:60%;
margin:auto;
border:2px dashed #4e73df;
padding:60px;
text-align:center;
cursor:pointer;
border-radius:15px;
background:white;
font-size:18px;
}

.upload-box:hover{
background:#f1f4ff;
}

#preview{
margin-top:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

body{
margin:0;
font-family:Arial;
}

.login-wrapper{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#4e73df,#1cc88a);
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
text-align:center;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

.login-box button{
width:100%;
padding:12px;
background:#4e73df;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.main-wrapper{
min-height:100vh;
background:linear-gradient(135deg,#f8f9fc,#dde2f1);
display:flex;
flex-direction:column;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="login-wrapper" id="loginPage">

<h1 style="color:white">Online Product Price Intelligence</h1>

<div class="login-box">

<h3>Login</h3>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- MAIN APP -->

<div id="mainApp" class="main-wrapper" style="display:none">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Price Intelligence</span>
</div>
</nav>

<div class="container my-5 text-center">

<h2>Upload Product Image</h2>

<div class="upload-box" id="upload-box">
Click here to upload image
<input type="file" id="fileInput" hidden accept="image/*">
</div>

<img id="preview" style="max-width:300px;display:none">

</div>

<div id="comparisonResults" class="container my-4" style="display:none">
<h3> class="mb-3">Price Comparison Results</h3>
<div id="resultsContainer" class="row"></div>
</div>

<footer class="bg-dark text-white text-center py-3">
© 2026 Online Product Price Intelligence System
</footer>

</div>

<script>

function login(){

const user=document.getElementById("username").value
const pass=document.getElementById("password").value

if(user && pass){

sessionStorage.setItem("loggedIn","true")

document.getElementById("loginPage").style.display="none"
document.getElementById("mainApp").style.display="block"

}else{

alert("Enter username and password")

}

}

window.onload=function(){

if(sessionStorage.getItem("loggedIn")==="true"){

document.getElementById("loginPage").style.display="none"
document.getElementById("mainApp").style.display="block"

}

}

document.addEventListener("DOMContentLoaded",function(){

const uploadBox=document.getElementById("upload-box")
const fileInput=document.getElementById("fileInput")
const preview=document.getElementById("preview")

uploadBox.addEventListener("click",()=>{

fileInput.click()

})

fileInput.addEventListener("change",async()=>{

const file=fileInput.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(e){

preview.src=e.target.result
preview.style.display="block"

}

reader.readAsDataURL(file)

const formData=new FormData()

formData.append("file",file)

try{

const response=await fetch("http://127.0.0.1:5000/upload-image",{

method:"POST",
body:formData

})

const text = await response.text()
console.log("SERVER RESPONSE:", text)

const data = JSON.parse(text)

console.log('Result array:', data.results)

if(data.results){
    showResults(data.results)
}else{
    alert("Backend returned error")
}

}catch(err){

alert("Upload failed")
console.error(err)

}

})

})

function showResults(results) {

  const section = document.getElementById("comparisonResults");
  const container = document.getElementById("resultsContainer");

  container.innerHTML = "";
  section.style.display = "block";

  results.forEach(item => {

    const card = document.createElement("div");
    card.className = "col-md-4";

    card.innerHTML = `
      <div class="card mb-3 shadow-sm">
        <div class="card-body">
          <h6>${item.title}</h6>
          <p><strong>Source:</strong> ${item.source}</p>
          <p><strong>Price:</strong> ${item.price}</p>
        </div>
      </div>
    `;

    container.appendChild(card);

  });

}

</script>

</body>
</html>
